const DB="bf6";
function odb(){return new Promise((r,j)=>{const q=indexedDB.open(DB,1);q.onupgradeneeded=()=>q.result.createObjectStore("p",{keyPath:"id"});q.onsuccess=()=>r(q.result);q.onerror=()=>j(q.error)})}
async function sav(d){const db=await odb();return new Promise((r,j)=>{const t=db.transaction("p","readwrite");t.objectStore("p").put({id:"ret",d,u:Date.now()});t.oncomplete=r;t.onerror=()=>j(t.error)})}
function ce(v){const s=String(v||"");return s.includes(",")||s.includes('"')||s.includes("\n")?`"${s.replace(/"/g,'""')}"`:s}
function pCSV(t){const l=t.trim().split("\n").filter(x=>x.trim());if(l.length<2)return[];return l.slice(1).map(s=>{const r=[];let c="",q=false;for(const h of s){if(h==='"'){q=!q;continue}if(h===","&&!q){r.push(c.trim());c="";continue}c+=h}r.push(c.trim());return r})}
function dlFile(blob,name){const a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download=name;a.click();URL.revokeObjectURL(a.href)}
function dlCSV(cols,rows,name){dlFile(new Blob([[cols.map(ce).join(","),...rows.map(r=>r.map(ce).join(","))].join("\n")],{type:"text/csv"}),name)}

  const send=async()=>{if(!inp.trim()||ld)return;const u=inp.trim();sInp("");const nm=[...ms,{role:"user",content:u}];sMs(nm);sLd(true);try{const r=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:1000,system:`BAForge AI — ${ph.n}. ${ph.ai} Real Estate Tool. CSV in \`\`\`csv fences.`,messages:nm.map(m=>({role:m.role,content:m.content}))})});const d=await r.json();sMs([...nm,{role:"assistant",content:d.content?.map(b=>b.text||"").filter(Boolean).join("\n")||"Error."}])}catch{sMs([...nm,{role:"assistant",content:"Connection error."}])}sLd(false)};

  // Template downloads

  const tot=Object.values(D).reduce((s,p)=>s+Object.values(p).reduce((s2,t)=>s2+t.length,0),0);

            <thead><tr><th style={{...F,fontSize:8,padding:"7px 4px",background:Z.sf,color:Z.t3,borderBottom:`1px solid ${Z.bd}`,position:"sticky",top:0,zIndex:1,width:28,textAlign:"center"}}>#</th>{tb?.c.map((c,ci)=>(<th key={ci} style={{...N,fontSize:10,fontWeight:600,padding:"7px 8px",background:Z.sf,color:Z.t2,borderBottom:`1px solid ${Z.bd}`,position:"sticky",top:0,zIndex:1,textAlign:"left",whiteSpace:"nowrap"}}>{c}</th>))}<th style={{background:Z.sf,borderBottom:`1px solid ${Z.bd}`,position:"sticky",top:0,width:40}}/></tr></thead>
            <tbody>
              {!td.length&&<tr><td colSpan={(tb?.c.length||0)+2} style={{padding:40,textAlign:"center",color:Z.t3,...N,fontSize:12,fontWeight:300}}>Empty — add rows, import CSV, or use AI</td></tr>}
              {td.map((row,ri)=>(<tr key={ri} style={{background:ri%2?`${Z.sf}60`:"transparent"}} onMouseEnter={e=>e.currentTarget.style.background=Z.cd} onMouseLeave={e=>e.currentTarget.style.background=ri%2?`${Z.sf}60`:"transparent"}>
                <td style={{...F,fontSize:8,padding:"3px 4px",textAlign:"center",color:Z.t3,borderBottom:`1px solid ${Z.bd}30`}}>{ri+1}</td>

                <td style={{padding:"2px",borderBottom:`1px solid ${Z.bd}30`,textAlign:"center"}}>{er===ri?<React.Fragment><button onClick={()=>sEr(null)} style={{background:"none",border:"none",cursor:"pointer",color:Z.gn,fontSize:12}}>✓</button><button onClick={()=>dR(ri)} style={{background:"none",border:"none",cursor:"pointer",color:Z.rd,fontSize:10}}>✕</button></React.Fragment>:<button onClick={()=>sEr(ri)} style={{background:"none",border:"none",cursor:"pointer",...F,fontSize:8,color:Z.t3}}>edit</button>}</td>
              </tr>))}
            </tbody>
          </table>
        </div>
      </div>)}

      {/* ═══ AI ═══ */}
      {vw==="wiz"&&(<div style={{display:"flex",flexDirection:"column",height:"calc(100vh - 48px)"}}>
        <div style={{padding:"10px 20px",background:Z.sf,borderBottom:`1px solid ${Z.bd}`,display:"flex",alignItems:"center",gap:8}}>
          <div style={{width:3,height:20,borderRadius:2,background:PC[pi]}}/><span style={{...N,fontSize:15,fontWeight:700,color:Z.tx}}>{ph.n}</span><span style={{...F,fontSize:9,color:Z.t3}}>AI</span><div style={{flex:1}}/><button onClick={()=>oP(pi)} style={{...F,fontSize:9,padding:"4px 10px",background:Z.rs,border:`1px solid ${Z.bd}`,borderRadius:5,color:Z.t2,cursor:"pointer"}}>◈ Tables</button></div>
        <div style={{flex:1,overflowY:"auto",padding:16}}>{ms.map((m,i)=>(<div key={i} style={{display:"flex",justifyContent:m.role==="user"?"flex-end":"flex-start",marginBottom:8}}><div style={{maxWidth:"82%",padding:"9px 13px",borderRadius:10,background:m.role==="user"?PC[pi]:Z.cd,color:m.role==="user"?"#fff":Z.tx,border:m.role==="user"?"none":`1px solid ${Z.bd}`,...N,fontSize:13,lineHeight:1.55,fontWeight:300}}>{m.role==="user"?m.content:<div dangerouslySetInnerHTML={{__html:md(m.content)}}/>}</div></div>))}{ld&&<div style={{padding:"9px 13px",borderRadius:10,background:Z.cd,border:`1px solid ${Z.bd}`,...N,fontSize:13,color:Z.t3,display:"inline-block"}}>Thinking...</div>}<div ref={cEnd}/></div>
        <div style={{padding:"10px 16px",borderTop:`1px solid ${Z.bd}`,background:Z.sf}}><div style={{display:"flex",gap:6}}><input value={inp} onChange={e=>sInp(e.target.value)} onKeyDown={e=>e.key==="Enter"&&!e.shiftKey&&send()} disabled={ld} placeholder={`Ask about ${ph.n.toLowerCase()}...`} style={{flex:1,...N,fontSize:13,padding:"9px 12px",borderRadius:7,border:`1px solid ${Z.bd}`,background:Z.bg,color:Z.tx,outline:"none",fontWeight:300}}/><button onClick={send} disabled={ld||!inp.trim()} style={{...N,fontSize:13,fontWeight:600,padding:"9px 18px",borderRadius:7,border:"none",background:!inp.trim()||ld?Z.rs:PC[pi],color:!inp.trim()||ld?Z.t3:"#fff",cursor:ld?"wait":"pointer"}}>Send</button></div></div>
      </div>)}

      {/* ═══ QUALITY ═══ */}
      {vw==="qual"&&(<div style={{padding:"24px",maxWidth:900,margin:"0 auto"}}>
        <div style={{display:"flex",alignItems:"center",gap:16,marginBottom:24}}><div style={{background:Z.cd,border:`1px solid ${Z.bd}`,borderRadius:14,width:80,height:80,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center"}}><div style={{...S,fontSize:36,fontWeight:700,color:Z.gn}}>{grade}</div><div style={{...F,fontSize:9,color:Z.t2}}>{oQ}%</div></div><div><h2 style={{...S,fontSize:20,fontWeight:700,color:Z.tx,margin:0}}>Quality</h2><p style={{...N,fontSize:11,color:Z.t2,margin:"4px 0 0",fontWeight:300}}>Real Estate Tool</p></div></div>
        {PH.map((p,idx)=>{const sc=qs[idx];const rc=p.t.reduce((s,t)=>s+(D[idx]?.[t.k]?.length||0),0);return(<div key={idx} onClick={()=>oP(idx)} style={{display:"flex",alignItems:"center",gap:10,padding:"8px 12px",background:Z.cd,border:`1px solid ${Z.bd}`,borderRadius:7,cursor:"pointer",marginBottom:3}} onMouseEnter={e=>e.currentTarget.style.borderColor=PC[idx]+"50"} onMouseLeave={e=>e.currentTarget.style.borderColor=Z.bd}><div style={{width:3,height:24,borderRadius:2,background:PC[idx]}}/><span style={{...F,fontSize:9,color:PC[idx],fontWeight:600,width:16}}>{idx+1}</span><span style={{...N,fontSize:12,fontWeight:500,color:Z.tx,flex:1}}>{p.n}</span><span style={{...F,fontSize:9,color:Z.t3}}>{rc}</span><div style={{width:100,height:4,background:Z.bd,borderRadius:2}}><div style={{height:4,borderRadius:2,width:`${sc*100}%`,background:sc===1?Z.gn:sc>0?Z.am:Z.bd}}/></div><span style={{...F,fontSize:10,fontWeight:600,color:sc===1?Z.gn:sc>0?Z.am:Z.t3,width:22,textAlign:"right"}}>{sc===1?"✓":Math.round(sc*100)+"%"}</span></div>)})}
      </div>)}

      {["dash","qual","tpl"].includes(vw)&&(<div style={{borderTop:`1px solid ${Z.bd}`,padding:"10px 24px",display:"flex",justifyContent:"space-between",marginTop:16}}><span style={{...F,fontSize:7,color:Z.t3}}>BAForge v6 · SFL Consulting · IndexedDB</span><span style={{...S,fontSize:9,color:Z.g3,fontStyle:"italic"}}>Forged in 25 years of delivery</span></div>)}
    </div>
  );
}


ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(BAForge));
